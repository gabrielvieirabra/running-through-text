name: evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install deps
        run: uv pip install --system -e ".[test]"
      - name: Run light suite
        run: pytest -m light evals/
