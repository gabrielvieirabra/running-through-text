services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: running_through_text
      POSTGRES_USER: rtt
      POSTGRES_PASSWORD: rtt_dev
    ports:
      - "5432:5432"
    volumes:
      - ./persistence/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - rtt_pg_data:/var/lib/postgresql/data

volumes:
  rtt_pg_data:
